name: Build

on:
  workflow_run:
    workflows: [Lint, Test, Type Check]
    types: [completed]
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check all prerequisite workflows passed
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const workflows = ['lint.yml', 'test.yml', 'typecheck.yml'];
            for (const file of workflows) {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: file,
                head_sha: sha,
                per_page: 1,
              });
              const latest = runs.workflow_runs[0];
              if (!latest || latest.conclusion !== 'success') {
                core.info(`${file} has not succeeded yet — skipping build.`);
                process.exit(78);
              }
            }

      - uses: ./.github/actions/setup
      - run: npx esbuild src/index.ts --bundle --platform=node --target=node18 --format=esm --outfile=build/index.js --minify --sourcemap
